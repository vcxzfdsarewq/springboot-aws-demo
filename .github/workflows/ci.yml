name: CI

# feature ブランチへの push と PR で実行 (Lint + Test)。main は deploy.yml が担当。
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # ubuntu-latest には Docker が同梱されるため Testcontainers の統合テストも実行される
      - name: Maven verify (unit + integration)
        run: mvn -B -ntp verify

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Validate each config
        run: |
          for dir in terraform/environments/staging terraform/environments/production terraform/bootstrap terraform/cicd; do
            echo "== validate $dir =="
            terraform -chdir="$dir" init -backend=false -input=false >/dev/null
            terraform -chdir="$dir" validate
          done
