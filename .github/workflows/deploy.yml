name: Deploy

# main へのマージで: テスト → イメージ build/push → staging 自動 → production 手動承認。
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: expense-api

jobs:
  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B -ntp verify

  build-push:
    name: Build & push image to ECR
    needs: test
    # AWS の build 用 OIDC ロール (AWS_BUILD_ROLE_ARN) が未設定なら deploy 系をスキップ。
    # → AWS セットアップ前は main push で赤くならず、test gate のみ実行される。
    if: ${{ vars.AWS_BUILD_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC
      contents: read
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, build role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image URI (immutable git SHA tag)
        id: image
        run: |
          TAG="git-${GITHUB_SHA::12}"
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        run: |
          docker build -f docker/Dockerfile -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          task-family: ${{ vars.ECS_TASK_FAMILY }}
          image: ${{ needs.build-push.outputs.image }}

  deploy-production:
    name: Deploy to production (manual approval)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production # GitHub Environment の required reviewers で手動承認ゲート
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy (同一イメージを昇格)
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          task-family: ${{ vars.ECS_TASK_FAMILY }}
          image: ${{ needs.build-push.outputs.image }}
