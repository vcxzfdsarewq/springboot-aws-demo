# ローカル開発用スタック: PostgreSQL + Redis + アプリ。
# 使い方: docker compose -f docker/docker-compose.yml up --build
#
# Redis は Phase 3 (Rate Limit / Refresh Token リプレイ) で使用する。
# 本番同等の依存をローカルでも揃えるため Phase 2 から含める。

name: expense-api

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense -d expense"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    # アプリは同一ネットワーク内で redis:6379 に接続するため、ホスト公開は不要。
    # ホストから触りたい場合: docker compose -f docker/docker-compose.yml exec redis redis-cli
    # (Windows の WinNAT 予約により 6379/6380 のホスト bind が失敗するため公開しない)
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ローカルの S3 代替 (本番は実 AWS S3)
  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    expose:
      - "9000"
    volumes:
      - minio-data:/data

  # 起動時に領収書バケットを作成して終了する一回限りのジョブ
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/expense-receipts;
      mc anonymous set none local/expense-receipts;
      echo 'bucket ready';
      "

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://db:5432/expense
      DB_USERNAME: expense
      DB_PASSWORD: expense
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: UTC
      # 本番では Secrets Manager から注入。ローカルは local プロファイルの既定が使われる。
      JWT_SECRET: local-dev-insecure-secret-please-override-32bytes
      # S3 (ローカルは MinIO)
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE: "true"
      S3_BUCKET: expense-receipts
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AWS_REGION: ap-northeast-1
      # ブラウザクライアントから使う場合に許可 origin をカンマ区切りで設定:
      # APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  db-data:
  minio-data:
