spring:
  application:
    name: expense-api
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense}
    username: ${DB_USERNAME:expense}
    password: ${DB_PASSWORD:expense}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    # 本番含む既定は versioned migration のみ。
    # 開発用シードは local/test プロファイルで db/seed を追加する (application-local.yml)。
    locations: classpath:db/migration

# 認証設定。本番では JWT_SECRET を Secrets Manager から注入する。
# 既定値を置かないため、prod で JWT_SECRET 未設定なら起動失敗 (fail-fast)。
# 開発用の既定は application-local.yml にのみ置く。
app:
  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL:900}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL:604800}
  cors:
    # カンマ区切りの許可 origin。既定は空 (クロスオリジン不可)。
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  s3:
    bucket: ${S3_BUCKET:expense-receipts}
    region: ${AWS_REGION:ap-northeast-1}
    # 本番は endpoint 未指定 (実 S3 + IAM タスクロール)。ローカルは MinIO を指定。
    endpoint: ${S3_ENDPOINT:}
    path-style-access: ${S3_PATH_STYLE:false}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    presign-expiry-seconds: 300

# Actuator: ヘルスチェックのみ公開 (機微エンドポイントは閉じる)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

logging:
  level:
    root: INFO
