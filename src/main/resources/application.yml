spring:
  application:
    name: expense-api
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense}
    username: ${DB_USERNAME:expense}
    password: ${DB_PASSWORD:expense}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    # 本番含む既定は versioned migration のみ。
    # 開発用シードは local/test プロファイルで db/seed を追加する (application-local.yml)。
    locations: classpath:db/migration
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

# Actuator: ヘルスチェックのみ公開 (機微エンドポイントは閉じる)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

logging:
  level:
    root: INFO
